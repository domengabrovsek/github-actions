# ==============================================
# PR Opened Notification
# ==============================================
# Reusable workflow for PR opened notifications

name: PR Opened Notification

on:
  workflow_call:
    inputs:
      api_url:
        required: true
        type: string
        description: 'Telegram API webhook URL'
      chat_id:
        required: true
        type: string
        description: 'Telegram chat ID to send notifications to'

jobs:
  get-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.format-commits.outputs.result }}
    steps:
      - name: Get commits from PR
        id: format-commits
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            // Get commits from the PR
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            if (commits.length === 0) {
              return '  No commits';
            }

            return commits.map(commit => {
              const message = commit.commit.message.split('\n')[0];
              const sha = commit.sha.substring(0, 7);
              return `  ${sha} - ${message}`;
            }).join('\n');

  notify:
    needs: get-commits
    uses: domengabrovsek/github-actions/.github/workflows/send-telegram-message.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}
      message: |
        🚀 New Pull Request Opened

        📝 Title: ${{ github.event.pull_request.title }}
        👤 Author: ${{ github.event.pull_request.user.login }}
        🌿 Branch: `${{ github.event.pull_request.head.ref }}` → `${{ github.event.pull_request.base.ref }}`
        📦 Repository: ${{ github.server_url }}/${{ github.repository }}
        🔗 Pull request: ${{ github.event.pull_request.html_url }}
        📋 Commits:
        ${{ needs.get-commits.outputs.commits }}
