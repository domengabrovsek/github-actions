# ==============================================
# Smart Notification Router
# ==============================================
# Single reusable workflow that routes all PR events
# to the correct notification handler.
#
# Usage (consumer just needs this in their repo):
#
# name: Notifications
# on:
#   pull_request:              # or pull_request_target, if the repo accepts fork PRs
#     types: [opened, closed, synchronize, review_requested]
#     branches: [main]
#   issue_comment:
#     types: [created]
#   pull_request_review:
#     types: [submitted]
#   pull_request_review_comment:
#     types: [created]
# jobs:
#   notify:
#     uses: domengabrovsek/github-actions/.github/workflows/notify.yml@main
#     with:
#       api_url: ${{ vars.TELEGRAM_API_URL }}
#       chat_id: ${{ vars.TELEGRAM_CHAT_ID }}
#
# Fork PRs: use `pull_request_target` so `vars.*` resolves for forks. The
# router's PR-event gates accept both `pull_request` and `pull_request_target`.
# Only safe because no job in this chain runs `actions/checkout` or executes
# any code from the PR head - it only reads event payload metadata.

name: Notification Router

on:
  workflow_call:
    inputs:
      api_url:
        required: true
        type: string
        description: 'Telegram API webhook URL'
      chat_id:
        required: true
        type: string
        description: 'Telegram chat ID to send notifications to'

jobs:
  # ---- Pull Request Events ----

  pr-opened:
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.action == 'opened'
    uses: domengabrovsek/github-actions/.github/workflows/pr-opened.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  pr-updated:
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.action == 'synchronize'
    uses: domengabrovsek/github-actions/.github/workflows/pr-updated.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  pr-merged:
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.action == 'closed' && github.event.pull_request.merged == true
    uses: domengabrovsek/github-actions/.github/workflows/pr-merged.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  pr-closed:
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.action == 'closed' && github.event.pull_request.merged == false
    uses: domengabrovsek/github-actions/.github/workflows/pr-closed.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  pr-review-requested:
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.action == 'review_requested'
    uses: domengabrovsek/github-actions/.github/workflows/pr-review-requested.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  # ---- Comment Events ----

  # Skip bot-authored comments (terraform plan, dependabot, github-actions) - notify on humans only
  pr-commented:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.user.type != 'Bot'
    uses: domengabrovsek/github-actions/.github/workflows/pr-commented.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  pr-review-comment:
    if: github.event_name == 'pull_request_review_comment' && github.event.comment.user.type != 'Bot'
    uses: domengabrovsek/github-actions/.github/workflows/pr-review-comment.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}

  # ---- Review Events ----

  pr-review:
    if: github.event_name == 'pull_request_review' && github.event.review.user.type != 'Bot'
    uses: domengabrovsek/github-actions/.github/workflows/pr-review.yml@main
    with:
      api_url: ${{ inputs.api_url }}
      chat_id: ${{ inputs.chat_id }}
